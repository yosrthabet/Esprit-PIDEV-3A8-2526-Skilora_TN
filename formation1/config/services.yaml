# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Recruitment/Entity/'
            - '../src/Recruitment/Controller/'
            - '../src/Kernel.php'

    App\Certificate\Branding\FormationSignatureStorage:
        arguments:
            $signaturesRoot: '%kernel.project_dir%/var/private/formations/signatures'

    App\Certificate\Branding\FormationSignatureStorageInterface: '@App\Certificate\Branding\FormationSignatureStorage'

    App\Certificate\Branding\CertificateBrandingAssetResolverInterface: '@App\Certificate\Branding\CertificateBrandingAssetResolver'

    App\Service\ChatbotServiceInterface: '@App\Service\ChatbotService'

    App\Contract\Chatbot\ExternalAiClientInterface: '@App\Service\Chatbot\OpenAiChatbotClient'

    App\Service\Chatbot\OpenAiChatbotClient:
        arguments:
            $apiKey: '%env(OPENAI_API_KEY)%'
            $model: '%env(OPENAI_MODEL)%'

    # ── Recruitment module ──────────────────────────────────────────
    App\Recruitment\Controller\:
        resource: '../src/Recruitment/Controller/'
        tags: ['controller.service_arguments']

    App\Recruitment\Service\ApplicationSubmissionService:
        arguments:
            $cvUploadDir: '%kernel.project_dir%/var/uploads/cvs'

    App\Recruitment\Controller\EmployerApplicationsController:
        arguments:
            $cvUploadDir: '%kernel.project_dir%/var/uploads/cvs'
            $projectDir: '%kernel.project_dir%'

    App\Recruitment\Controller\CandidateJobOfferController:
        arguments:
            $employerSeesAllCandidatures: true

    App\Recruitment\Controller\EmployerInterviewsController:
        arguments:
            $employerSeesAllCandidatures: true

    App\Recruitment\Command\SeedEmployerApplicationsCommand:
        arguments:
            $cvUploadDir: '%kernel.project_dir%/var/uploads/cvs'

    App\Recruitment\Command\SpreadEmployerDemoApplicationsCommand:
        arguments:
            $cvUploadDir: '%kernel.project_dir%/var/uploads/cvs'

    App\Recruitment\Repository\ApplicationsTableGateway:
        arguments:
            $employerSeesAllCandidatures: true

    App\Recruitment\Repository\ApplicationRepository:
        arguments:
            $employerSeesAllCandidatures: true

    # ── Finance module ──────────────────────────────────────────────
    App\Service\Finance\FinanceStripeClient:
        arguments:
            $secretKey: '%env(STRIPE_SECRET_KEY)%'

    App\Service\Finance\TwilioWhatsAppNotifier:
        arguments:
            $accountSid: '%env(TWILIO_ACCOUNT_SID)%'
            $authToken: '%env(TWILIO_AUTH_TOKEN)%'
            $fromWhatsapp: '%env(TWILIO_WHATSAPP_FROM)%'
            $smsFrom: '%env(TWILIO_SMS_FROM)%'

    App\Service\Finance\PayslipPaymentSmsService:
        arguments:
            $paymentApiUrl: '%env(PAYMENT_API_URL)%'
            $paymentApiKey: '%env(PAYMENT_API_KEY)%'
            $paymentExtraJson: '%env(PAYMENT_EXTRA_JSON)%'
            $smsApiUrl: '%env(SMS_API_URL)%'
            $smsApiKey: '%env(SMS_API_KEY)%'
            $smsExtraJson: '%env(SMS_EXTRA_JSON)%'
            $smsSenderName: '%env(SMS_SENDER_NAME)%'
